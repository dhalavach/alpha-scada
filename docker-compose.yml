services:
  gateway:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Gateway/Alpha.Scada.Gateway.csproj
        DLL: Alpha.Scada.Gateway.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      ServiceAuth__Token: ${SERVICE_AUTH_TOKEN:?SERVICE_AUTH_TOKEN must be set in .env}
      Services__Identity: http://identity:8080
      Services__Tenant: http://tenant:8080
      Services__Asset: http://asset:8080
      Services__TagCatalog: http://tag-catalog:8080
      Services__Telemetry: http://telemetry:8080
      Services__Alarm: http://alarm:8080
      Services__Reporting: http://reporting:8080
    ports:
      - "5202:8080"
    networks:
      - alpha-internal
    depends_on:
      - identity
      - tenant
      - asset
      - tag-catalog
      - telemetry
      - alarm
      - reporting

  identity:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Identity/Alpha.Scada.Identity.csproj
        DLL: Alpha.Scada.Identity.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_identity;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    networks:
      - alpha-internal
    depends_on:
      - postgres

  tenant:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Tenant/Alpha.Scada.Tenant.csproj
        DLL: Alpha.Scada.Tenant.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_tenant;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    networks:
      - alpha-internal
    depends_on:
      - postgres

  asset:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Asset/Alpha.Scada.Asset.csproj
        DLL: Alpha.Scada.Asset.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_asset;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    networks:
      - alpha-internal
    depends_on:
      - postgres

  tag-catalog:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.TagCatalog/Alpha.Scada.TagCatalog.csproj
        DLL: Alpha.Scada.TagCatalog.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_tag_catalog;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    networks:
      - alpha-internal
    depends_on:
      - postgres

  telemetry:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Telemetry/Alpha.Scada.Telemetry.csproj
        DLL: Alpha.Scada.Telemetry.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_telemetry;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    networks:
      - alpha-internal
    depends_on:
      - postgres

  alarm:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Alarm/Alpha.Scada.Alarm.csproj
        DLL: Alpha.Scada.Alarm.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_alarm;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    networks:
      - alpha-internal
    depends_on:
      - postgres

  reporting:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Reporting/Alpha.Scada.Reporting.csproj
        DLL: Alpha.Scada.Reporting.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_reporting;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      Services__Asset: http://asset:8080
      Services__Telemetry: http://telemetry:8080
      Services__Alarm: http://alarm:8080
    networks:
      - alpha-internal
    depends_on:
      - postgres
      - asset
      - telemetry
      - alarm

  edge:
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Edge/Alpha.Scada.Edge.csproj
        DLL: Alpha.Scada.Edge.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_edge;Username=alpha;Password=alpha
      Mqtt__Enabled: "true"
      Mqtt__Host: mosquitto
      Mqtt__Port: "1883"
      ServiceAuth__Token: ${SERVICE_AUTH_TOKEN:?SERVICE_AUTH_TOKEN must be set in .env}
      Simulator__Enabled: "true"
      Services__Tenant: http://tenant:8080
      Services__Asset: http://asset:8080
      Services__TagCatalog: http://tag-catalog:8080
      Services__Telemetry: http://telemetry:8080
      Services__Alarm: http://alarm:8080
      Services__Gateway: http://gateway:8080
    networks:
      - alpha-internal
    depends_on:
      - postgres
      - mosquitto
      - tenant
      - asset
      - tag-catalog
      - telemetry
      - alarm
      - gateway

  frontend:
    build:
      context: .
      dockerfile: src/Alpha.Scada.Web/Dockerfile
    ports:
      - "8080:80"
    networks:
      - alpha-internal
    depends_on:
      - gateway

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alpha_identity
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
    networks:
      - alpha-internal
    volumes:
      - alpha-postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  mosquitto:
    image: eclipse-mosquitto:2
    networks:
      - alpha-internal
    volumes:
      - ./ops/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["ops"]
    networks:
      - alpha-internal
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["ops"]
    networks:
      - alpha-internal
    volumes:
      - alpha-grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  alpha-postgres-data:
  alpha-grafana-data:

networks:
  alpha-internal:
    driver: bridge
