services:
  api:
    build:
      context: .
      dockerfile: src/Alpha.Scada.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_scada;Username=alpha;Password=alpha
      Simulator__Enabled: "true"
      Mqtt__Enabled: "true"
      Mqtt__Host: mosquitto
      Mqtt__Port: "1883"
    ports:
      - "5202:8080"
    depends_on:
      - postgres
      - mosquitto

  frontend:
    build:
      context: .
      dockerfile: src/Alpha.Scada.Web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alpha_scada
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
    ports:
      - "5432:5432"
    volumes:
      - alpha-postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./ops/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["ops"]
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["ops"]
    ports:
      - "3000:3000"
    volumes:
      - alpha-grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  alpha-postgres-data:
  alpha-grafana-data:
