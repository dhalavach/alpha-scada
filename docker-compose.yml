services:
  gateway:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Gateway/Alpha.Scada.Gateway.csproj
        DLL: Alpha.Scada.Gateway.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_gateway;Username=alpha;Password=alpha
      Nats__Url: nats://nats:4222
      Nats__User: ${NATS_USER_SERVICES:?NATS_USER_SERVICES must be set in .env}
      Nats__Password: ${NATS_PASSWORD_SERVICES:?NATS_PASSWORD_SERVICES must be set in .env}
      Services__Identity: http://identity:8080
      Services__Tenant: http://tenant:8080
      Services__Asset: http://asset:8080
      Services__TagCatalog: http://tag-catalog:8080
      Services__Telemetry: http://telemetry:8080
      Services__Alarm: http://alarm:8080
      Services__Reporting: http://reporting:8080
    ports:
      - "5202:8080"
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      identity:
        condition: service_started
      tenant:
        condition: service_started
      asset:
        condition: service_started
      tag-catalog:
        condition: service_started
      telemetry:
        condition: service_started
      alarm:
        condition: service_started
      reporting:
        condition: service_started

  identity:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Identity/Alpha.Scada.Identity.csproj
        DLL: Alpha.Scada.Identity.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_identity;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      Seed__DemoData: "true"
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy

  tenant:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Tenant/Alpha.Scada.Tenant.csproj
        DLL: Alpha.Scada.Tenant.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_tenant;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      Seed__DemoData: "true"
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy

  asset:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Asset/Alpha.Scada.Asset.csproj
        DLL: Alpha.Scada.Asset.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_asset;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      Nats__Url: nats://nats:4222
      Nats__User: ${NATS_USER_SERVICES:?NATS_USER_SERVICES must be set in .env}
      Nats__Password: ${NATS_PASSWORD_SERVICES:?NATS_PASSWORD_SERVICES must be set in .env}
      Services__Tenant: http://tenant:8080
      Seed__DemoData: "true"
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      tenant:
        condition: service_started

  tag-catalog:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.TagCatalog/Alpha.Scada.TagCatalog.csproj
        DLL: Alpha.Scada.TagCatalog.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_tag_catalog;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      Seed__DemoData: "true"
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy

  telemetry:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Telemetry/Alpha.Scada.Telemetry.csproj
        DLL: Alpha.Scada.Telemetry.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_telemetry;Username=alpha;Password=alpha;Maximum Pool Size=100
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      Nats__Url: nats://nats:4222
      Nats__User: ${NATS_USER_SERVICES:?NATS_USER_SERVICES must be set in .env}
      Nats__Password: ${NATS_PASSWORD_SERVICES:?NATS_PASSWORD_SERVICES must be set in .env}
      Services__Tenant: http://tenant:8080
      Services__Asset: http://asset:8080
      Services__TagCatalog: http://tag-catalog:8080
      Telemetry__Ingestion__MaxDegreeOfParallelism: "8"
      Timescale__RetentionDays: "365"
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      tenant:
        condition: service_started
      asset:
        condition: service_started
      tag-catalog:
        condition: service_started

  alarm:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Alarm/Alpha.Scada.Alarm.csproj
        DLL: Alpha.Scada.Alarm.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_alarm;Username=alpha;Password=alpha
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      Nats__Url: nats://nats:4222
      Nats__User: ${NATS_USER_SERVICES:?NATS_USER_SERVICES must be set in .env}
      Nats__Password: ${NATS_PASSWORD_SERVICES:?NATS_PASSWORD_SERVICES must be set in .env}
      Services__Asset: http://asset:8080
      Services__Tenant: http://tenant:8080
      Services__TagCatalog: http://tag-catalog:8080
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      asset:
        condition: service_started
      tenant:
        condition: service_started
      tag-catalog:
        condition: service_started

  reporting:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Reporting/Alpha.Scada.Reporting.csproj
        DLL: Alpha.Scada.Reporting.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_reporting;Username=alpha;Password=alpha
      Nats__Url: nats://nats:4222
      Nats__User: ${NATS_USER_SERVICES:?NATS_USER_SERVICES must be set in .env}
      Nats__Password: ${NATS_PASSWORD_SERVICES:?NATS_PASSWORD_SERVICES must be set in .env}
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      Services__Asset: http://asset:8080
      Services__Telemetry: http://telemetry:8080
      Services__Alarm: http://alarm:8080
      Services__TagCatalog: http://tag-catalog:8080
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      asset:
        condition: service_started
      telemetry:
        condition: service_started
      alarm:
        condition: service_started
      tag-catalog:
        condition: service_started

  edge:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Dockerfile.service
      args:
        PROJECT: src/Alpha.Scada.Edge/Alpha.Scada.Edge.csproj
        DLL: Alpha.Scada.Edge.dll
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=alpha_edge;Username=alpha;Password=alpha
      Nats__Url: nats://nats:4222
      Nats__User: ${NATS_USER_EDGE:?NATS_USER_EDGE must be set in .env}
      Nats__Password: ${NATS_PASSWORD_EDGE:?NATS_PASSWORD_EDGE must be set in .env}
      Simulator__Enabled: "true"
    networks:
      - alpha-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: src/Alpha.Scada.Web/Dockerfile
    ports:
      - "8080:80"
    networks:
      - alpha-internal
    depends_on:
      - gateway

  postgres:
    restart: unless-stopped
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: alpha_identity
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha -d alpha_identity"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - alpha-internal
    volumes:
      - alpha-postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  nats:
    restart: unless-stopped
    image: nats:2.12-alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    environment:
      NATS_PASSWORD_EDGE: ${NATS_PASSWORD_EDGE:?NATS_PASSWORD_EDGE must be set in .env}
      NATS_PASSWORD_SERVICES: ${NATS_PASSWORD_SERVICES:?NATS_PASSWORD_SERVICES must be set in .env}
      NATS_PASSWORD_ADMIN: ${NATS_PASSWORD_ADMIN:?NATS_PASSWORD_ADMIN must be set in .env}
    networks:
      - alpha-internal
    ports:
      - "4222:4222"
      - "1883:1883"
      - "8222:8222"
    volumes:
      - ./ops/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - alpha-nats-data:/data

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["ops"]
    networks:
      - alpha-internal
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["ops"]
    ports:
      - "3000:3000"
    networks:
      - alpha-internal
    volumes:
      - alpha-grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  alpha-postgres-data:
  alpha-grafana-data:
  alpha-nats-data:

networks:
  alpha-internal:
    driver: bridge
