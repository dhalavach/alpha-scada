apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: alpha-scada
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: alpha-scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: alpha_scada
            - name: POSTGRES_USER
              value: alpha
            - name: POSTGRES_PASSWORD
              value: alpha
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: alpha-scada
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
