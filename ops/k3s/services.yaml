apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-scada-gateway
  namespace: alpha-scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpha-scada-gateway
  template:
    metadata:
      labels:
        app: alpha-scada-gateway
    spec:
      containers:
        - name: gateway
          image: alpha-scada-gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: alpha-scada-config
            - secretRef:
                name: alpha-scada-secrets
          env:
            - name: ConnectionStrings__Postgres
              value: Host=postgres;Port=5432;Database=alpha_reporting;Username=alpha;Password=alpha
            - name: Mqtt__User
              valueFrom:
                secretKeyRef:
                  name: alpha-scada-secrets
                  key: MQTT_USER_GATEWAY
            - name: Mqtt__Password
              valueFrom:
                secretKeyRef:
                  name: alpha-scada-secrets
                  key: MQTT_PASSWORD_GATEWAY
            - name: Services__Identity
              value: http://identity:8080
            - name: Services__Tenant
              value: http://tenant:8080
            - name: Services__Asset
              value: http://asset:8080
            - name: Services__TagCatalog
              value: http://tag-catalog:8080
            - name: Services__Telemetry
              value: http://telemetry:8080
            - name: Services__Alarm
              value: http://alarm:8080
            - name: Services__Reporting
              value: http://reporting:8080
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: alpha-scada
spec:
  selector:
    app: alpha-scada-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
