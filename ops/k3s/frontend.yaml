apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-scada-web
  namespace: alpha-scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpha-scada-web
  template:
    metadata:
      labels:
        app: alpha-scada-web
    spec:
      containers:
        - name: web
          image: alpha-scada-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: alpha-scada-web
  namespace: alpha-scada
spec:
  selector:
    app: alpha-scada-web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alpha-scada
  namespace: alpha-scada
spec:
  rules:
    - host: alpha-scada.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alpha-scada-web
                port:
                  number: 80
