apiVersion: v1
kind: ConfigMap
metadata:
  name: alpha-scada-config
  namespace: alpha-scada
data:
  ASPNETCORE_URLS: http://+:8080
  Region: EU
  Mqtt__Enabled: "true"
  Mqtt__Host: mosquitto
  Mqtt__Port: "1883"
  Simulator__Enabled: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: alpha-scada-secrets
  namespace: alpha-scada
type: Opaque
stringData:
  Jwt__Secret: replace-with-generated-jwt-secret
