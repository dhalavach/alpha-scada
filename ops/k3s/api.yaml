apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-scada-api
  namespace: alpha-scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpha-scada-api
  template:
    metadata:
      labels:
        app: alpha-scada-api
    spec:
      containers:
        - name: api
          image: alpha-scada-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: alpha-scada-config
            - secretRef:
                name: alpha-scada-secrets
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: alpha-scada-api
  namespace: alpha-scada
spec:
  selector:
    app: alpha-scada-api
  ports:
    - port: 8080
      targetPort: 8080
