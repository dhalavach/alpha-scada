apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: alpha-scada
data:
  mosquitto.conf: |
    listener 1883 0.0.0.0
    allow_anonymous false
    password_file /mosquitto/config/passwords
    acl_file /mosquitto/config/acl

    persistence true
    persistence_location /mosquitto/data/
    autosave_interval 60

    max_inflight_messages 100
    max_queued_messages 10000
    queue_qos0_messages false

    log_dest stdout
  acl: |
    user edge
    topic write alpha/+/+/+/telemetry
    topic write alpha/+/+/+/status
    topic write alpha/_dlq/edge/#

    user telemetry
    topic read alpha/+/+/+/telemetry
    topic read alpha/+/+/+/status
    topic write alpha/+/+/+/telemetry-stored
    topic write alpha/_dlq/telemetry/#

    user alarm
    topic read alpha/+/+/+/telemetry
    topic read alpha/+/+/+/status
    topic read alpha/+/+/+/telemetry-stored
    topic write alpha/+/+/+/alarm/+
    topic write alpha/_dlq/alarm/#

    user asset
    topic read alpha/+/+/+/telemetry
    topic read alpha/+/+/+/status
    topic read alpha/+/+/+/telemetry-stored
    topic write alpha/+/+/+/status
    topic write alpha/_dlq/asset/#

    user gateway
    topic read alpha/+/+/+/#
    topic write alpha/_dlq/gateway/#

    user admin
    topic read alpha/#
---
apiVersion: v1
kind: Secret
metadata:
  name: mosquitto-passwords
  namespace: alpha-scada
type: Opaque
stringData:
  passwords: |
    # Replace this file with output from mosquitto_passwd before applying.
    edge:replace-with-mosquitto-passwd-hash
    telemetry:replace-with-mosquitto-passwd-hash
    alarm:replace-with-mosquitto-passwd-hash
    asset:replace-with-mosquitto-passwd-hash
    gateway:replace-with-mosquitto-passwd-hash
    admin:replace-with-mosquitto-passwd-hash
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-data
  namespace: alpha-scada
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: alpha-scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - containerPort: 1883
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
              readOnly: true
            - name: config
              mountPath: /mosquitto/config/acl
              subPath: acl
              readOnly: true
            - name: passwords
              mountPath: /mosquitto/config/passwords
              subPath: passwords
              readOnly: true
            - name: data
              mountPath: /mosquitto/data
      volumes:
        - name: config
          configMap:
            name: mosquitto-config
        - name: passwords
          secret:
            secretName: mosquitto-passwords
        - name: data
          persistentVolumeClaim:
            claimName: mosquitto-data
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: alpha-scada
spec:
  selector:
    app: mosquitto
  ports:
    - port: 1883
      targetPort: 1883
