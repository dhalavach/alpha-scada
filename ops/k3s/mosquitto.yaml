apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: alpha-scada
data:
  mosquitto.conf: |
    listener 1883 0.0.0.0
    allow_anonymous true
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: alpha-scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2
          ports:
            - containerPort: 1883
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config/mosquitto.conf
              subPath: mosquitto.conf
      volumes:
        - name: config
          configMap:
            name: mosquitto-config
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: alpha-scada
spec:
  selector:
    app: mosquitto
  ports:
    - port: 1883
      targetPort: 1883
