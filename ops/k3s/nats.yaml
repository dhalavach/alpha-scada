apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: alpha-scada
data:
  nats-server.conf: |
    server_name: alpha-scada

    port: 4222
    http_port: 8222

    jetstream {
      store_dir: "/data/jetstream"
      max_mem_store: 256M
      max_file_store: 2G
    }

    mqtt {
      port: 1883
    }

    authorization {
      users = [
        {
          user: "edge"
          password: $NATS_PASSWORD_EDGE
          permissions: {
            publish: ["alpha.*.*.*.telemetry", "alpha.*.*.*.status"]
            subscribe: ["_INBOX.>"]
          }
        },
        {
          user: "services"
          password: $NATS_PASSWORD_SERVICES
          permissions: {
            publish: [">"]
            subscribe: [">"]
          }
        },
        {
          user: "admin"
          password: $NATS_PASSWORD_ADMIN
          permissions: {
            publish: [">"]
            subscribe: [">"]
          }
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-data
  namespace: alpha-scada
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: alpha-scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.12-alpine
          args: ["-c", "/etc/nats/nats-server.conf"]
          env:
            - name: NATS_PASSWORD_EDGE
              valueFrom:
                secretKeyRef:
                  name: alpha-scada-secrets
                  key: NATS_PASSWORD_EDGE
            - name: NATS_PASSWORD_SERVICES
              valueFrom:
                secretKeyRef:
                  name: alpha-scada-secrets
                  key: NATS_PASSWORD_SERVICES
            - name: NATS_PASSWORD_ADMIN
              valueFrom:
                secretKeyRef:
                  name: alpha-scada-secrets
                  key: NATS_PASSWORD_ADMIN
          ports:
            - containerPort: 4222
            - containerPort: 1883
            - containerPort: 8222
          volumeMounts:
            - name: config
              mountPath: /etc/nats/nats-server.conf
              subPath: nats-server.conf
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: data
          persistentVolumeClaim:
            claimName: nats-data
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: alpha-scada
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: mqtt
      port: 1883
      targetPort: 1883
    - name: monitoring
      port: 8222
      targetPort: 8222
