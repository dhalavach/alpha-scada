groups:
  - name: alpha-scada-messaging
    rules:
      - alert: AlphaScadaWolverineOutboxBacklog
        expr: alpha_scada_wolverine_outbox_depth > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Wolverine outbox backlog is growing"
          description: "Service {{ $labels.service }} has {{ $value }} pending outgoing envelopes."

      - alert: AlphaScadaWolverineErrorQueueNotEmpty
        expr: alpha_scada_wolverine_error_queue_depth > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Wolverine error queue is not empty"
          description: "Service {{ $labels.service }} has {{ $value }} dead-lettered messages."

      - alert: AlphaScadaAlarmOutboxBacklog
        expr: alpha_scada_alarm_outbox_pending > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Alarm outbox backlog is growing"
          description: "Alarm has {{ $value }} events awaiting delivery."

      - alert: AlphaScadaAlarmOutboxPoisonRows
        expr: alpha_scada_alarm_outbox_poison > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Alarm outbox contains poison rows"
          description: "Alarm has {{ $value }} events that exhausted delivery attempts."
