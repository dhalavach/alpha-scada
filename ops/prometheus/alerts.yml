groups:
  - name: alpha-scada-messaging
    rules:
      - alert: AlphaScadaWolverineOutboxBacklog
        expr: alpha_scada_wolverine_outbox_depth > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Wolverine outbox backlog is growing"
          description: "Service {{ $labels.service }} has {{ $value }} pending outgoing envelopes."

      - alert: AlphaScadaWolverineErrorQueueNotEmpty
        expr: alpha_scada_wolverine_error_queue_depth > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Wolverine error queue is not empty"
          description: "Service {{ $labels.service }} has {{ $value }} dead-lettered messages."

      # These NATS broker-side metrics require a NATS exporter or log-derived
      # metric source. The rules are inert until that exporter is added.
      - alert: AlphaScadaNatsErrorBacklog
        expr: alpha_scada_nats_error_backlog > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "NATS error backlog is not empty"
          description: "Service {{ $labels.service }} has {{ $value }} messages requiring broker-side triage."

      - alert: AlphaScadaNatsConsumerLag
        expr: alpha_scada_nats_consumer_lag_seconds > 60
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "NATS consumer lag is high"
          description: "Service {{ $labels.service }} has NATS consumer lag of {{ $value }} seconds."
