server_name: alpha-scada

port: 4222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  max_mem_store: 256M
  max_file_store: 2G
}

mqtt {
  port: 1883
}

authorization {
  users = [
    {
      user: "edge"
      password: $NATS_PASSWORD_EDGE
      permissions: {
        publish: ["alpha.*.*.*.telemetry", "alpha.*.*.*.status"]
        subscribe: ["_INBOX.>"]
      }
    },
    # The service tier remains broad for Wolverine JetStream API, inbox,
    # advisory, and version-dependent consumer subjects. Edge credentials are
    # the isolation boundary for untrusted field publishers in this v1 config.
    {
      user: "services"
      password: $NATS_PASSWORD_SERVICES
      permissions: {
        publish: [">"]
        subscribe: [">"]
      }
    },
    { user: "admin", password: $NATS_PASSWORD_ADMIN }
  ]
}
